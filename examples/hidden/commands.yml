app: hidden
version: 0.0.1
description: |
  Sample showing how to hide commands from --help at runtime, based on conditions.
  Drea is available at https://github.com/david-antiteum/drea.

  There is no YAML flag for hiding commands. Hiding is always a runtime
  decision: the application sets Command::mHidden = true based on whatever
  context it has (build flags, env vars, CLI options, licenses, feature
  toggles, etc). For caller-dependent gating (auth tier, role, license),
  prefer the "group:" YAML key; see examples/groups.

  This sample defines three commands:
    - "ping":     always visible
    - "debug":    declared in commands.yml, hidden unless --dev is set
    - "internal": added programmatically, hidden unless --dev is set

  Hidden commands are indistinguishable from typos: --help omits them,
  completion omits them, and direct invocation produces the same
  "Unknown command" error as a misspelled name.

  Try:
    ./hidden                # lists only "ping"
    ./hidden --help         # same
    ./hidden --dev --help   # lists all three
    ./hidden --dev debug    # runs (--dev unhides)
    ./hidden debug          # "Unknown command" error

options:
  - option: dev
    description: unhide developer-only commands

commands:
  - command: ping
    description: print "pong"
  - command: debug
    description: dump internal state
